site_name: Forge - AI Repo Workbench
site_description: Explicit AI for real repository work.
site_url: https://tino-koenig.github.io/forge/
repo_url: https://github.com/tino-koenig/forge
docs_dir: docs/user
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: de
          name: Deutsch
          build: true

extra_css:
  - assets/stylesheets/landing.css

extra_javascript:
  - assets/javascripts/landing-theme-toggle.js

nav:
  - Home: en/index.md
  - Getting Started: en/getting-started.md
  - Core Commands: en/core-commands.md
  - Trust & Safety: en/trust-and-safety.md
  - Runtime Settings & Sessions: en/runtime-settings-and-sessions.md
  - LLM Setup: en/llm-setup.md
  - Troubleshooting: en/troubleshooting.md
  - FAQ: en/faq.md
